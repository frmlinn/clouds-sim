name: Minify and Deploy to GH Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Minifiers
        run: |
          npm install -g terser clean-css-cli

      - name: Build and Minify Files
        run: |
          mkdir -p dist/js dist/css

          touch dist/.nojekyll
        
          cp index.html dist/index.html
          cp -r assets dist/assets
          cp -r shaders dist/shaders
          
          for file in js/*.js; do
            filename=$(basename "$file")
            terser "$file" -o "dist/js/$filename"
          done
          
          for file in css/*.css; do
            filename=$(basename "$file")
            cleancss -o "dist/css/$filename" "$file"
          done

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages